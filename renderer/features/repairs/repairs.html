<!doctype html>
<html lang="uk">
<head>
    <meta charset="utf-8" /><title>Ремонти</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../dashboard/dashboard.css"><link rel="stylesheet" href="./repairs.css">
</head>
<body>
    <div class="layout">
        <header class="appbar"><img src="../../assets/logo.jpg" alt="Контакт" class="brand-logo" /><div class="appbar-right"><button id="btnConfigurator" class="btn-config" type="button">Конфігуратор ПК</button><div class="today" id="today"></div></div></header>
        <aside class="sidebar">
            <div class="menu-title">МЕНЮ</div>
            <nav class="menu">
                <a href="../dashboard/dashboard.html"><img class="ico" src="../../assets/icons/dashboard.png" alt=""><span>Дашборд</span></a>
                <a href="../sales/sales.html"><img class="ico" src="../../assets/icons/sales.png" alt=""><span>Продажі</span></a>
                <a class="active"><img class="ico" src="../../assets/icons/repairs.png" alt=""><span>Ремонти</span></a>
                <a href="../clients/clients.html"><img class="ico" src="../../assets/icons/clients.png" alt=""><span>Клієнти</span></a>
                <a href="../analytics/analytics.html"><img class="ico" src="../../assets/icons/analytics.png" alt=""> Аналітика</a>
            </nav>
            <div class="menu-title small">ІНШЕ</div>
            <nav class="menu">
                <a><img class="ico" src="../../assets/icons/help.png" alt="">Допомога</a>
                <a href="../settings/settings.html"><img class="ico" src="../../assets/icons/settings.png" alt="">Налаштування</a>
                <a id="logout"><img class="ico" src="../../assets/icons/logout.png" alt="">Вихід</a>
            </nav>
            <div class="side-profile">
                <div class="sp-avatar" id="sideProfileAvatar">?</div>
                <div class="sp-meta"><div class="sp-name" id="sideProfileName">Користувач</div><div class="sp-role" id="sideProfileRole">—</div></div>
            </div>
        </aside>
        <main class="main repairs">
            <h1 class="page-title">Ремонти</h1>
            <div class="toolbar">
                <div class="left">
                    <div class="search"><svg class="search-ico" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M21 21l-4.2-4.2M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><input id="q" type="text" placeholder="Пошук: клієнт, пристрій, № або проблема"></div>
                    <details class="dropdown"><summary class="btn btn-ghost">Фільтри</summary>
                        <div class="dropdown-menu wide">
                            <label>Статус<select id="fStatus"><option value="">Будь-який</option><option value="new">Новий</option><option value="progress">В процесі</option><option value="done">Готово</option><option value="issued">Видано</option><option value="canceled">Скасовано</option></select></label>
                            <label>Тип пристрою<select id="fDeviceType"><option value="">Будь-який</option><option>ПК</option><option>Ноутбук</option><option>Телефон</option><option>Периферія</option></select></label>
                            <label>Дата від <input id="fFrom" type="date"></label><label>Дата до <input id="fTo" type="date"></label>
                            <div class="dropdown-actions"><button id="fReset" class="btn btn-ghost">Скинути</button><button id="fApply" class="btn">Застосувати</button></div></div></details>
                    <details class="dropdown"><summary class="btn btn-ghost">Сортування</summary>
                        <div class="dropdown-menu narrow">
                            <label>Поле<select id="sortField"><option value="Date">Дата</option><option value="Status">Статус</option><option value="Price">Вартість</option><option value="Id">№</option><option value="Client">Клієнт</option><option value="Device">Пристрій</option></select></label>
                            <label>Порядок<select id="sortDir"><option value="desc">Спадання ↓</option><option value="asc">Зростання ↑</option></select></label>
                            <div class="dropdown-actions"><button id="sReset" class="btn btn-ghost">Скинути</button><button id="sApply" class="btn">Ок</button></div></div></details>
                    <div class="view-toggle">
                        <button id="btnViewTable" class="btn btn-ghost active" title="Таблиця">☰ Таблиця</button>
                        <button id="btnViewKanban" class="btn btn-ghost" title="Дошка">▦ Дошка</button>
                    </div>
                </div>
                <div class="right"><button id="btnCreate" class="btn" type="button">Створити ордер</button></div>
            </div>

            <!-- Table view -->
            <div class="table-wrap">
                <table class="table-repairs">
                    <colgroup><col style="width:72px"><col style="width:140px"><col style="width:200px"><col style="width:280px"><col style="width:200px"><col style="width:140px"><col style="width:120px"><col style="width:140px"><col style="width:56px"></colgroup>
                    <thead><tr><th data-sort="Id">№</th><th data-sort="Date">Дата</th><th data-sort="Client">Клієнт</th><th data-sort="Device">Пристрій</th><th>Проблема</th><th data-sort="Status">Статус</th><th data-sort="Price">Вартість</th><th>Майстер</th><th>Дія</th></tr></thead>
                    <tbody id="repairsTbody"></tbody>
                </table>
            </div>
            <div id="pager" class="pager"></div>

            <!-- Kanban view -->
            <div id="kanbanBoard" class="kanban-board" style="display:none"></div>
        </main>
    </div>

    <div id="rowMenuPortal" class="row-menu-portal" hidden></div>

    <!-- Create/Edit modal -->
    <div id="repairModal" class="modal-layer" hidden>
        <div class="modal-card card" role="dialog">
            <h3 class="card-title" id="repairModalTitle">Створити ордер</h3>
            <form id="repairForm" class="body" novalidate>
                <div class="row two"><div class="field"><label>Дата</label><input id="rfDate" type="date" required></div><div class="field"><label>Статус</label><select id="rfStatus"><option value="new">Новий</option><option value="progress">В процесі</option><option value="done">Готово</option><option value="issued">Видано</option><option value="canceled">Скасовано</option></select></div></div>
                <div class="row two"><div class="field"><label>Клієнт</label><input id="rfClient" placeholder="Ім'я або телефон…" autocomplete="off"><input id="rfClientId" type="hidden"></div><div class="field"><label>Пристрій</label><input id="rfDevice" type="text" required></div></div>
                <div class="row two" id="rfNewClientRow" style="display:none"><div class="field"><label for="rfNewClientPhone">Телефон нового клієнта *</label><input id="rfNewClientPhone" type="tel" inputmode="tel" maxlength="19" placeholder="0XX XXX XX XX"></div><div class="field"><label for="rfNewClientEmail">Email нового клієнта *</label><input id="rfNewClientEmail" type="email" placeholder="email@example.com"></div></div>
                <div class="row"><div class="field"><label>Проблема</label><input id="rfProblem" type="text" required></div></div>
                <div class="row two"><div class="field"><label for="rfMaster">Майстер</label><select id="rfMaster"></select></div><div class="field"><label>Вартість (₴)</label><input id="rfPrice" type="number" min="0" value="0"></div></div>
                <div class="row"><div class="field"><label>Нотатка</label><input id="rfNote" type="text"></div></div>
                <div class="actions"><button id="rfCancel" class="btn-ghost" type="button">Скасувати</button><button id="rfSubmitBtn" class="btn" type="submit">Зберегти</button></div>
            </form>
        </div>
    </div>

    <script src="../../core/common.js"></script>
    <script src="./repairs.js"></script>
</body>
</html>
