<!doctype html>
<html lang="uk">
<head>
    <meta charset="utf-8" />
    <title>Клієнти</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../dashboard/dashboard.css">
    <link rel="stylesheet" href="./clients.css">
</head>
<body>
    <div class="layout">
        <header class="appbar">
            <img src="../../assets/logo.jpg" alt="Контакт" class="brand-logo" />
            <div class="appbar-right"><button id="btnConfigurator" class="btn-config" type="button">Конфігуратор ПК</button><div class="today" id="today"></div></div>
        </header>
        <aside class="sidebar">
            <div class="menu-title">МЕНЮ</div>
            <nav class="menu">
                <a href="../dashboard/dashboard.html"><img class="ico" src="../../assets/icons/dashboard.png" alt=""><span>Дашборд</span></a>
                <a href="../sales/sales.html"><img class="ico" src="../../assets/icons/sales.png" alt=""><span>Продажі</span></a>
                <a href="../repairs/repairs.html"><img class="ico" src="../../assets/icons/repairs.png" alt="">Ремонти</a>
                <a class="active"><img class="ico" src="../../assets/icons/clients.png" alt=""><span>Клієнти</span></a>
                <a href="../analytics/analytics.html"><img class="ico" src="../../assets/icons/analytics.png" alt=""> Аналітика</a>
            </nav>
            <div class="menu-title small">ІНШЕ</div>
            <nav class="menu">
                <a><img class="ico" src="../../assets/icons/help.png" alt="">Допомога</a>
                <a href="../settings/settings.html"><img class="ico" src="../../assets/icons/settings.png" alt="">Налаштування</a>
                <a id="logout"><img class="ico" src="../../assets/icons/logout.png" alt="">Вихід</a>
            </nav>
            <div class="side-profile">
                <div class="sp-avatar" id="sideProfileAvatar">?</div>
                <div class="sp-meta"><div class="sp-name" id="sideProfileName">Користувач</div><div class="sp-role" id="sideProfileRole">—</div></div>
            </div>
        </aside>
        <main class="main clients">
            <h1 class="page-title">Клієнти</h1>
            <div class="toolbar">
                <div class="left">
                    <div class="search">
                        <svg class="search-ico" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M21 21l-4.2-4.2M11 19a 8 8 0 1 1 0-16 8 8 0 0 1 0 16Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" /></svg>
                        <input id="q" type="text" placeholder="Пошук: ім'я, телефон або email">
                    </div>
                    <button id="btnBulkDelete" class="btn btn-danger" type="button" style="display:none">Видалити вибрані</button>
                </div>
                <div class="right">
                    <button id="btnAdd" class="btn" type="button">Додати клієнта</button>
                </div>
            </div>

            <!-- Add Modal -->
            <div id="clientModal" class="modal-layer" hidden>
                <div class="modal-card">
                    <form id="clientForm" class="card" autocomplete="off" novalidate>
                        <h2 class="card-title">Новий клієнт</h2>
                        <div class="row"><div class="field"><label for="cfFullName">Ім'я *</label><input id="cfFullName" type="text" required></div></div>
                        <div class="row two"><div class="field"><label for="cfPhone">Телефон *</label><input id="cfPhone" type="tel" inputmode="tel" maxlength="19" placeholder="0XX XXX XX XX" required></div><div class="field"><label for="cfEmail">Email *</label><input id="cfEmail" type="email" placeholder="email@example.com" required></div></div>
                        <div class="actions"><button type="button" class="btn btn-ghost" id="cfCancel">Скасувати</button><button type="submit" class="btn">Зберегти</button></div>
                    </form>
                </div>
            </div>

            <!-- Edit Modal -->
            <div id="editClientModal" class="modal-layer" hidden>
                <div class="modal-card">
                    <form id="editClientForm" class="card" autocomplete="off" novalidate>
                        <h2 class="card-title">Редагувати клієнта</h2>
                        <input id="efId" type="hidden">
                        <div class="row"><div class="field"><label for="efFullName">Ім'я *</label><input id="efFullName" type="text" required></div></div>
                        <div class="row two"><div class="field"><label for="efPhone">Телефон *</label><input id="efPhone" type="tel" inputmode="tel" maxlength="19" required></div><div class="field"><label for="efEmail">Email *</label><input id="efEmail" type="email" required></div></div>
                        <div class="actions"><button type="button" class="btn btn-ghost" id="efCancel">Скасувати</button><button type="submit" class="btn">Зберегти</button></div>
                    </form>
                </div>
            </div>

            <!-- History Modal -->
            <div id="historyModal" class="modal-layer" hidden>
                <div class="modal-card modal-wide">
                    <div class="card">
                        <div style="display:flex;justify-content:space-between;align-items:center"><h2 class="card-title">Історія клієнта</h2><button id="historyClose" class="btn btn-ghost">✕</button></div>
                        <div id="historyContent"></div>
                    </div>
                </div>
            </div>

            <div class="table-wrap">
                <table class="table-clients">
                    <thead><tr>
                        <th class="col-cb"><input type="checkbox" id="selectAll"></th>
                        <th data-sort="FullName">Ім'я</th>
                        <th data-sort="Phone">Телефон</th>
                        <th data-sort="Email">Email</th>
                        <th>Дії</th>
                    </tr></thead>
                    <tbody id="clientsTbody"></tbody>
                </table>
            </div>
            <div id="pager" class="pager"></div>
        </main>
    </div>
    <div id="rowMenuPortal" class="row-menu-portal" hidden></div>
    <script src="../../core/common.js"></script>
    <script src="./clients.js"></script>
</body>
</html>
